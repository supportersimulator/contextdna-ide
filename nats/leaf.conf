# NATS leaf-node config — lite mode connects to heavy NATS chief
port: 4222
http_port: 8222

jetstream {
    store_dir: /data/jetstream
    max_memory_store: 256MB
    max_file_store: 1GB
}

leafnodes {
    remotes = [
        {
            url: "${NATS_REMOTE_URL:-nats://127.0.0.1:4222}"
            credentials: "/etc/nats/leaf.creds"
        }
    ]
}
