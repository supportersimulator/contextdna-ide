# Multi-Fleet docs build (and optional GitHub Pages deploy).
#
# Build-only by default — Aaron's call when to flip the deploy switch.
# To enable Pages publishing later:
#   1. Repo Settings -> Pages -> Source: GitHub Actions
#   2. Uncomment the `deploy` job below
#   3. Push to main
#
# Triggers:
#   - push to main affecting multi-fleet/docs/** or multi-fleet/mkdocs.yml
#   - manual dispatch (any branch)

name: docs

on:
  push:
    branches: [main]
    paths:
      - "multi-fleet/docs/**"
      - "multi-fleet/mkdocs.yml"
      - "multi-fleet/scripts/build-docs.sh"
      - "multi-fleet/scripts/serve-docs.sh"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "multi-fleet/docs/**"
      - "multi-fleet/mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  # Pages + id-token are needed only for the deploy job. They are harmless
  # to declare here even when the deploy job is disabled.
  pages: write
  id-token: write

concurrency:
  group: "docs-${{ github.ref }}"
  cancel-in-progress: true

# Freeze gate (CI budget=$0 directive 2026-05-06, lift ~2026-05-13).
# When repo variable FLEET_PUSH_FREEZE='1' (default), the build job is skipped.
# Toggle: gh variable set FLEET_PUSH_FREEZE --body "0"   # or via Actions UI
# See scripts/lift-freeze.sh / scripts/restore-freeze.sh and
# .fleet/audits/2026-05-04-N3-ci-freeze-lift-prep.md for full context.

jobs:
  build:
    name: Build mkdocs site (strict)
    if: ${{ vars.FLEET_PUSH_FREEZE != '1' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: multi-fleet
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build with --strict
        run: bash scripts/build-docs.sh

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: multi-fleet-docs-site
          path: multi-fleet/site
          if-no-files-found: error
          retention-days: 14

      # Pages-compatible artifact, ready for the deploy job to pick up.
      # Generated unconditionally so we know the deploy step would work.
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: multi-fleet/site

  # Uncomment to publish to GitHub Pages. Aaron's call.
