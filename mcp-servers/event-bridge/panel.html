<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Bridge — Live Feed</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 { font-size: 14px; font-weight: 600; color: #58a6ff; }
  #status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #3fb950;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  #status-dot.disconnected { background: #f85149; }
  #status-dot.connecting   { background: #d29922; }
  #status-label { color: #8b949e; font-size: 11px; }
  #event-count  { margin-left: auto; color: #8b949e; font-size: 11px; }
  #clear-btn {
    margin-left: 8px;
    background: #21262d;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
  }
  #clear-btn:hover { background: #30363d; color: #e6edf3; }

  #filters {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 8px 16px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .filter-label {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; color: #8b949e; user-select: none;
    font-size: 11px;
  }
  .filter-label input { accent-color: #58a6ff; cursor: pointer; }
  .filter-label:hover { color: #e6edf3; }

  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .event {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 6px 16px;
    border-bottom: 1px solid #21262d;
    transition: background 0.15s;
  }
  .event:hover { background: #161b22; }
  .event.hidden { display: none; }

  .event-time  { color: #8b949e; white-space: nowrap; flex-shrink: 0; width: 90px; }
  .event-type  { flex-shrink: 0; width: 130px; }
  .event-data  { color: #a8b1ba; flex: 1; word-break: break-all; white-space: pre-wrap; }

  /* Per-type colours */
  .type-fleet-heartbeat { color: #3fb950; }
  .type-fleet-evidence  { color: #79c0ff; }
  .type-fleet-race      { color: #d2a8ff; }
  .type-fleet-webhook   { color: #ffa657; }
  .type-source-error    { color: #f85149; }
  .type-unknown         { color: #8b949e; }

  #footer {
    background: #161b22;
    border-top: 1px solid #30363d;
    padding: 6px 16px;
    font-size: 11px;
    color: #8b949e;
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }
  #footer span { white-space: nowrap; }
  #footer .ok   { color: #3fb950; }
  #footer .err  { color: #f85149; }
</style>
</head>
<body>
<header>
  <div id="status-dot" class="connecting"></div>
  <h1>Event Bridge</h1>
  <span id="status-label">connecting…</span>
  <span id="event-count">0 events</span>
  <button id="clear-btn" onclick="clearFeed()">Clear</button>
</header>

<div id="filters">
  <label class="filter-label"><input type="checkbox" value="fleet.heartbeat" checked> fleet.heartbeat</label>
  <label class="filter-label"><input type="checkbox" value="fleet.evidence"  checked> fleet.evidence</label>
  <label class="filter-label"><input type="checkbox" value="fleet.race"      checked> fleet.race</label>
  <label class="filter-label"><input type="checkbox" value="fleet.webhook"   checked> fleet.webhook</label>
  <label class="filter-label"><input type="checkbox" value="source_error"    checked> source_error</label>
</div>

<div id="feed"></div>

<div id="footer">
  <span id="f-heartbeat">heartbeat: —</span>
  <span id="f-evidence">evidence: —</span>
  <span id="f-race">race: —</span>
  <span id="f-webhook">webhook: —</span>
  <span id="f-clients" style="margin-left:auto">clients: —</span>
  <span id="f-ring">ring: —</span>
</div>

<script>
const BASE = location.origin;
const SSE_URL = `${BASE}/api/v1/events`;
const HEALTH_URL = `${BASE}/health`;

let es = null;
let totalEvents = 0;
const activeFilters = new Set(['fleet.heartbeat','fleet.evidence','fleet.race','fleet.webhook','source_error']);

// Filter checkboxes
document.querySelectorAll('#filters input').forEach(cb => {
  cb.addEventListener('change', () => {
    if (cb.checked) activeFilters.add(cb.value);
    else activeFilters.delete(cb.value);
    applyFilters();
  });
});

function applyFilters() {
  document.querySelectorAll('.event').forEach(el => {
    const t = el.dataset.type;
    el.classList.toggle('hidden', !activeFilters.has(t));
  });
}

function clearFeed() {
  document.getElementById('feed').innerHTML = '';
  totalEvents = 0;
  document.getElementById('event-count').textContent = '0 events';
}

function typeClass(t) {
  return 'type-' + t.replace(/\./g, '-');
}

function formatData(data) {
  try {
    const obj = typeof data === 'string' ? JSON.parse(data) : data;
    return JSON.stringify(obj, null, 2);
  } catch { return String(data); }
}

function appendEvent(type, data) {
  totalEvents++;
  document.getElementById('event-count').textContent = `${totalEvents} events`;

  const feed = document.getElementById('feed');
  const row = document.createElement('div');
  row.className = 'event' + (activeFilters.has(type) ? '' : ' hidden');
  row.dataset.type = type;

  const now = new Date();
  const ts = now.toTimeString().slice(0, 8) + '.' + String(now.getMilliseconds()).padStart(3, '0');

  row.innerHTML = `
    <span class="event-time">${ts}</span>
    <span class="event-type ${typeClass(type)}">${type}</span>
    <span class="event-data">${escHtml(formatData(data))}</span>
  `;
  feed.appendChild(row);
  // Auto-scroll if near bottom
  if (feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80) {
    feed.scrollTop = feed.scrollHeight;
  }

  // Cap DOM at 600
  while (feed.children.length > 600) {
    feed.removeChild(feed.firstChild);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function connect() {
  const dot = document.getElementById('status-dot');
  const lbl = document.getElementById('status-label');
  dot.className = 'connecting';
  lbl.textContent = 'connecting…';

  es = new EventSource(SSE_URL);

  const TYPES = ['fleet.heartbeat','fleet.evidence','fleet.race','fleet.webhook','source_error'];
  TYPES.forEach(t => {
    es.addEventListener(t, e => {
      let data;
      try { data = JSON.parse(e.data); } catch { data = e.data; }
      appendEvent(t, data);
    });
  });

  es.onopen = () => {
    dot.className = '';
    dot.style.background = '#3fb950';
    lbl.textContent = 'connected';
  };

  es.onerror = () => {
    dot.className = 'disconnected';
    lbl.textContent = 'disconnected — retrying…';
    es.close();
    setTimeout(connect, 3000);
  };
}

// Health poll
async function pollHealth() {
  try {
    const r = await fetch(HEALTH_URL);
    const h = await r.json();
    const s = h.sources || {};
    const fmt = (key, id) => {
      const v = s[key] || '—';
      const el = document.getElementById(id);
      if (el) {
        el.textContent = `${key.split('.')[1]}: ${v === 'ok' ? 'ok' : v}`;
        el.className = v === 'ok' ? 'ok' : 'err';
      }
    };
    fmt('fleet.heartbeat','f-heartbeat');
    fmt('fleet.evidence', 'f-evidence');
    fmt('fleet.race',     'f-race');
    fmt('fleet.webhook',  'f-webhook');
    const fc = document.getElementById('f-clients');
    if (fc) fc.textContent = `clients: ${h.clients ?? '—'}`;
    const fr = document.getElementById('f-ring');
    if (fr) fr.textContent = `ring: ${h.ring_size ?? '—'}`;
  } catch { /* ZSF */ }
}

connect();
setInterval(pollHealth, 5000);
pollHealth();
</script>
</body>
</html>
