<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evidence Stream</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #14141a;
      --border: #2a2a3a;
      --accent: #6c8fff;
      --ok: #4ade80;
      --warn: #facc15;
      --err: #f87171;
      --muted: #666680;
      --text: #e2e2f0;
      --mono: "Fira Mono", "Cascadia Code", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }
    header h1 { font-size: 14px; font-weight: 600; color: var(--accent); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
    .status-dot.error { background: var(--err); }
    #status-label { color: var(--muted); font-size: 11px; }
    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column-reverse; /* newest at top */
      gap: 6px;
    }
    .entry {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      background: var(--surface);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 6px 12px;
      align-items: start;
    }
    .entry-meta {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .entry-type {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      background: #1e2040;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .entry-content {
      grid-column: 2;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hash-chip {
      grid-column: 3;
      grid-row: 1 / 3;
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }
    .hash-chip code {
      font-family: var(--mono);
      font-size: 9px;
      color: #888;
    }
    .chain-ok { color: var(--ok); font-size: 10px; }
    .chain-fail { color: var(--err); font-size: 10px; }
    .chain-na { color: var(--muted); font-size: 10px; }
    #empty-state {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
    }
    footer {
      padding: 6px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
    }
  </style>
</head>
<body>
<header>
  <div class="status-dot" id="dot"></div>
  <h1>Evidence Stream</h1>
  <span id="status-label">connecting…</span>
</header>

<div id="feed">
  <div id="empty-state">Waiting for evidence entries…</div>
</div>

<footer>
  <span id="count">0 entries</span>
  <span id="last-event">—</span>
</footer>

<script>
  const EVIDENCE_SSE_URL = 'http://127.0.0.1:8878/evidence/stream';
  const EVIDENCE_LATEST_URL = 'http://127.0.0.1:8878/evidence/latest?n=50';
  const RECONNECT_DELAY_MS = 3000;

  const feed = document.getElementById('feed');
  const dot = document.getElementById('dot');
  const statusLabel = document.getElementById('status-label');
  const countEl = document.getElementById('count');
  const lastEventEl = document.getElementById('last-event');
  const emptyState = document.getElementById('empty-state');

  let totalCount = 0;
  let prevHash = null; // for hash-chain verification
  let es = null;

  // ── Hash-chain verify ──────────────────────────────────────────────────────
  // Each entry carries _hash (sha256 of its own JSON). We track the previous
  // entry's hash and display whether the chain is intact.
  // Note: chain verification is display-only; actual cryptographic chain
  // requires a prev_hash field baked in at write time.
  function chainStatus(entry) {
    if (!entry._hash) return { label: '—', cls: 'chain-na' };
    if (prevHash === null) return { label: 'anchor', cls: 'chain-na' };
    // If the entry carries a prev_hash field, verify it
    if ('prev_hash' in entry) {
      if (entry.prev_hash === prevHash) return { label: '✓ chain ok', cls: 'chain-ok' };
      return { label: '✗ chain break', cls: 'chain-fail' };
    }
    return { label: 'no prev_hash', cls: 'chain-na' };
  }

  // ── Render one entry ───────────────────────────────────────────────────────
  function renderEntry(entry) {
    if (emptyState.parentNode) emptyState.remove();

    const chain = chainStatus(entry);
    prevHash = entry._hash || prevHash;
    totalCount++;

    const ts = entry.created_at || entry.timestamp || entry.ts || '—';
    const type = entry.type || entry.kind || 'unknown';
    const content = entry.content || entry.text || entry.body || JSON.stringify(entry);
    const hash = entry._hash ? entry._hash.slice(0, 12) + '…' : '—';

    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `
      <span class="entry-meta">${escHtml(String(ts))}</span>
      <span class="entry-type">${escHtml(String(type))}</span>
      <div class="hash-chip">
        <code>${escHtml(hash)}</code>
        <span class="${chain.cls}">${chain.label}</span>
      </div>
      <div class="entry-content" title="${escHtml(String(content))}">${escHtml(String(content).slice(0, 200))}</div>
    `;

    // Prepend (feed is column-reverse so newest appears at top)
    feed.prepend(div);

    countEl.textContent = `${totalCount} entries`;
    lastEventEl.textContent = new Date().toLocaleTimeString();
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Load historical entries first ──────────────────────────────────────────
  async function loadHistory() {
    try {
      const res = await fetch(EVIDENCE_LATEST_URL);
      if (!res.ok) return;
      const rows = await res.json();
      // rows come newest-first; render in reverse so chain order is correct
      const ordered = [...rows].reverse();
      for (const row of ordered) renderEntry(row);
    } catch (_) {
      // ZSF — ignore fetch errors
    }
  }

  // ── SSE connection with auto-reconnect ─────────────────────────────────────
  function connect() {
    if (es) { try { es.close(); } catch (_) {} }

    dot.className = 'status-dot';
    statusLabel.textContent = 'connecting…';

    es = new EventSource(EVIDENCE_SSE_URL);

    es.onopen = () => {
      dot.className = 'status-dot connected';
      statusLabel.textContent = 'live';
    };

    es.onmessage = (evt) => {
      try {
        const entry = JSON.parse(evt.data);
        renderEntry(entry);
      } catch (_) {
        // ZSF — malformed SSE data, skip
      }
    };

    es.onerror = () => {
      dot.className = 'status-dot error';
      statusLabel.textContent = `reconnecting in ${RECONNECT_DELAY_MS / 1000}s…`;
      es.close();
      es = null;
      setTimeout(connect, RECONNECT_DELAY_MS);
    };
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  (async () => {
    await loadHistory();
    connect();
  })();
</script>
</body>
</html>
