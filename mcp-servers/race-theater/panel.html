<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Theater</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #6366f1;
      --emerald: #10b981;
      --amber: #f59e0b;
      --rose: #f43f5e;
      --sky: #38bdf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      padding: 16px;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    header h1 span { color: var(--accent); }

    .meta {
      color: var(--muted);
      font-size: 11px;
    }

    .meta .badge {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      margin-left: 6px;
      color: var(--emerald);
    }

    #status-bar {
      margin-bottom: 12px;
      padding: 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 11px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:hover { background: var(--surface); }

    tbody td {
      padding: 8px 10px;
      vertical-align: middle;
    }

    .rank {
      color: var(--muted);
      font-size: 11px;
      width: 28px;
      text-align: center;
    }

    .rank.first  { color: #fbbf24; font-weight: 700; }
    .rank.second { color: #94a3b8; }
    .rank.third  { color: #b45309; }

    .node-name {
      font-weight: 600;
      color: var(--text);
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .wins { color: var(--emerald); font-weight: 700; }
    .races { color: var(--sky); }
    .commits { color: var(--amber); }
    .items { color: var(--accent); }

    .bar-cell { width: 120px; }
    .bar-bg {
      background: var(--border);
      border-radius: 3px;
      height: 6px;
      overflow: hidden;
    }
    .bar-fill {
      background: var(--accent);
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .empty {
      padding: 32px;
      text-align: center;
      color: var(--muted);
    }

    .empty code {
      display: block;
      margin-top: 8px;
      color: var(--accent);
    }

    footer {
      margin-top: 14px;
      color: var(--muted);
      font-size: 10px;
      display: flex;
      justify-content: space-between;
    }

    .error { color: var(--rose); padding: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>⚡ <span>Race Theater</span></h1>
    <div class="meta">
      Fleet leaderboard
      <span class="badge" id="active-badge">— active</span>
    </div>
  </header>

  <div id="status-bar">Connecting to http://127.0.0.1:8877/race-status …</div>

  <div id="content">
    <div class="empty">Loading…</div>
  </div>

  <footer>
    <span id="last-updated">—</span>
    <span>race-theater · mcp-servers/race-theater · refresh 10s</span>
  </footer>

  <script>
    const ENDPOINT = 'http://127.0.0.1:8877/race-status';
    const REFRESH_MS = 10_000;

    const statusBar  = document.getElementById('status-bar');
    const content    = document.getElementById('content');
    const activeBadge = document.getElementById('active-badge');
    const lastUpdated = document.getElementById('last-updated');

    const rankLabel = (i) => {
      if (i === 0) return '<span class="rank first">🥇</span>';
      if (i === 1) return '<span class="rank second">🥈</span>';
      if (i === 2) return '<span class="rank third">🥉</span>';
      return `<span class="rank">${i + 1}</span>`;
    };

    function renderLeaderboard(data) {
      const rows = data.leaderboard || [];
      activeBadge.textContent = `${data.active_race_count ?? 0} active`;

      const totalRaces = data.total_races || 0;
      statusBar.textContent =
        `Races: ${totalRaces} total · ${data.active_race_count ?? 0} active` +
        ` · Fleet items done: ${data.fleet_items_done_total ?? 0}`;

      if (!rows.length) {
        content.innerHTML = `
          <div class="empty">
            No fleet data yet.
            <code>RACE_PUBLISH=1 bash scripts/3s-brainstorm.sh "topic"</code>
          </div>`;
        return;
      }

      const maxWins = Math.max(...rows.map(r => r.races_won), 1);

      const tableRows = rows.map((r, i) => `
        <tr>
          <td class="rank">${rankLabel(i)}</td>
          <td><span class="node-name">${escHtml(r.node)}</span></td>
          <td class="num wins">${r.races_won}</td>
          <td class="num races">${r.races_participated}</td>
          <td class="num commits">${r.commits_today}</td>
          <td class="num items">${r.items_done}</td>
          <td class="bar-cell">
            <div class="bar-bg">
              <div class="bar-fill" style="width:${Math.round((r.races_won / maxWins) * 100)}%"></div>
            </div>
          </td>
        </tr>
      `).join('');

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Node</th>
              <th class="num">Wins</th>
              <th class="num">Races</th>
              <th class="num">Commits/day</th>
              <th class="num">Items done</th>
              <th class="bar-cell"></th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>`;

      const ts = data.generated_at
        ? new Date(data.generated_at).toLocaleTimeString()
        : '—';
      lastUpdated.textContent = `Updated ${ts}`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    async function fetchAndRender() {
      try {
        const resp = await fetch(ENDPOINT, { cache: 'no-store' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        renderLeaderboard(data);
      } catch (err) {
        statusBar.innerHTML = `<span class="error">⚠ ${escHtml(String(err))} — retrying in ${REFRESH_MS / 1000}s</span>`;
      }
    }

    fetchAndRender();
    setInterval(fetchAndRender, REFRESH_MS);
  </script>
</body>
</html>
